<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <title>Civil Coffee Cafe: A Perfect Clash of Modern and Classical Styles</title>
    <style>
      :root {
        --ink: #171512;
        --muted: #5f5a54;
        --line: #ded6cc;
        --paper: #ffffff;
        --warm: #f8efe5;
        --accent: #c47a29;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
      }

      .hero {
        width: 100%;
        height: clamp(260px, 38vw, 520px);
        overflow: hidden;
      }

      .hero img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .article {
        width: min(760px, calc(100% - 40px));
        margin: 0 auto;
        padding: 34px 0 72px;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        letter-spacing: 0;
        line-height: 1.05;
      }

      h1 {
        max-width: 620px;
        font-size: clamp(34px, 5vw, 54px);
        font-weight: 800;
      }

      .location {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 18px 0;
        color: var(--muted);
        font-size: 14px;
      }

      .location svg {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
      }

      .subtitle {
        max-width: 650px;
        margin: 0 0 22px;
        color: var(--muted);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(18px, 2.4vw, 23px);
        font-style: italic;
        line-height: 1.45;
      }

      .description {
        max-width: 650px;
        margin: 0 0 28px;
        color: #302c27;
        font-size: 15px;
      }

      .brief {
        margin: 0 0 28px;
        border-left: 3px solid var(--accent);
        border-radius: 6px;
        padding: 18px 20px;
        background: var(--warm);
      }

      .brief-title {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 10px;
        color: var(--accent);
        font-weight: 800;
      }

      .brief-title svg {
        width: 18px;
        height: 18px;
      }

      .brief p {
        margin: 0;
        color: #302c27;
        font-size: 15px;
      }

      .content {
        border-top: 1px solid var(--line);
        padding-top: 24px;
      }

      h2 {
        margin-bottom: 16px;
        font-size: 30px;
      }

      .section {
        margin: 0 0 24px;
      }

      .section h3 {
        margin-bottom: 8px;
        font-size: 18px;
        line-height: 1.25;
      }

      .section p {
        margin: 0;
        color: #292520;
        font-size: 14px;
        white-space: pre-line;
      }

      @media (max-width: 640px) {
        .article {
          width: min(100% - 28px, 760px);
          padding-top: 26px;
        }

        .hero {
          height: 260px;
        }
      }
    </style>
  </head>
  <body>
    <figure class="hero">
      <img src="" alt="Civil Coffee Cafe: A Perfect Clash of Modern and Classical Styles" />
    </figure>

    <main class="article">
      <h1>Civil Coffee Cafe: A Perfect Clash of Modern and Classical Styles</h1>

      <p class="location">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5Z"
          />
        </svg>
        <span>Los Angeles</span>
      </p>

      <p class="subtitle"></p>
      <p class="description"></p>

      <aside class="brief">
        <p class="brief-title">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M7 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Zm1 4v2h8V7H8Zm0 4v2h8v-2H8Zm0 4v2h5v-2H8Z"
            />
          </svg>
          Brief
        </p>
        <p></p>
      </aside>

      <section class="content" aria-labelledby="content-title">
        <h2 id="content-title">Content</h2>
        
          <article class="section">
            <p>Civil Coffee
Civil Coffee: A Perfect Fusion of Modern and Classical Elegance</p>
          </article>
        
      </section>
    </main>
  </body>
</html>
